<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MC Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080c10;
      --surface:   #0e1520;
      --surface2:  #131d2b;
      --border:    #1a2540;
      --accent:    #4ade80;
      --accent-dim:#166534;
      --danger:    #f87171;
      --warn:      #fbbf24;
      --text:      #e2e8f0;
      --muted:     #3a5070;
      --log-bg:    #060a0f;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      overflow: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(74,222,128,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74,222,128,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: .05em;
      color: var(--accent);
    }

    .logo span { color: var(--muted); font-weight: 700; }

    .spacer { flex: 1; }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px;
      border-radius: 4px;
      border: 1px solid var(--border);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      transition: all .3s;
    }

    .status-badge.online  { border-color: var(--accent-dim); color: var(--accent); }
    .status-badge.offline { border-color: #3d1515; color: var(--danger); }
    .status-badge.loading { border-color: var(--border); color: var(--muted); }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    .status-badge.online .dot {
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; box-shadow: 0 0 0 0 rgba(74,222,128,.4); }
      50%      { opacity: .7; box-shadow: 0 0 0 4px rgba(74,222,128,0); }
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border: 1px solid;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .15s;
      background: transparent;
    }

    .btn:disabled { opacity: .35; cursor: not-allowed; }

    .btn-start {
      color: var(--accent);
      border-color: var(--accent-dim);
    }
    .btn-start:hover:not(:disabled) {
      background: rgba(74,222,128,.1);
      box-shadow: 0 0 12px rgba(74,222,128,.2);
    }

    .btn-stop {
      color: var(--danger);
      border-color: #3d1515;
    }
    .btn-stop:hover:not(:disabled) {
      background: rgba(248,113,113,.1);
      box-shadow: 0 0 12px rgba(248,113,113,.15);
    }

    /* ── Main ── */
    main {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .logs-wrapper {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    #logs {
      height: 100%;
      overflow-y: auto;
      padding: 12px 16px;
      background: var(--log-bg);
      font-size: 12px;
      line-height: 1.7;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    #logs::-webkit-scrollbar { width: 6px; }
    #logs::-webkit-scrollbar-track { background: transparent; }
    #logs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .log-line {
      white-space: pre-wrap;
      word-break: break-all;
      animation: fadeIn .1s ease;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .log-line.info  { color: #8eb4d4; }
    .log-line.warn  { color: var(--warn); }
    .log-line.error { color: var(--danger); }
    .log-line.done  { color: var(--accent); font-weight: 500; }
    .log-line.plain { color: #6b8baa; }

    .log-disconnected {
      color: var(--muted);
      font-style: italic;
      padding: 8px 0;
    }

    /* ── Console ── */
    .console-bar {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 10px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .console-prompt {
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      padding-right: 10px;
      flex-shrink: 0;
      user-select: none;
    }

    #console-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      caret-color: var(--accent);
    }

    #console-input::placeholder { color: var(--muted); }

    #console-input:disabled { opacity: .4; cursor: not-allowed; }

    .btn-send {
      color: var(--muted);
      border-color: var(--border);
      padding: 4px 10px;
      font-size: 10px;
    }
    .btn-send:hover:not(:disabled) {
      color: var(--text);
      border-color: var(--muted);
    }

    /* Spinner */
    .spin {
      display: inline-block;
      width: 10px; height: 10px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">MC <span>//</span> DASHBOARD</div>
    <div class="spacer"></div>
    <div class="status-badge loading" id="status-badge">
      <div class="dot"></div>
      <span id="status-text">...</span>
    </div>
    <button class="btn btn-start" id="btn-start" disabled>▶ START</button>
    <button class="btn btn-stop"  id="btn-stop"  disabled>■ STOP</button>
  </header>

  <main>
    <div class="logs-wrapper">
      <div id="logs"></div>
    </div>

    <div class="console-bar">
      <span class="console-prompt">&gt;</span>
      <input id="console-input" type="text" placeholder="Commande Minecraft..." autocomplete="off" disabled />
      <button class="btn btn-send" id="btn-send" disabled>ENVOYER</button>
    </div>
  </main>

</div>

<script>
  const logsEl      = document.getElementById('logs')
  const statusBadge = document.getElementById('status-badge')
  const statusText  = document.getElementById('status-text')
  const btnStart    = document.getElementById('btn-start')
  const btnStop     = document.getElementById('btn-stop')
  const consoleInput= document.getElementById('console-input')
  const btnSend     = document.getElementById('btn-send')

  let isRunning = false
  let isStopping = false
  let isTransitioning = false
  let autoScroll = true
  let ws = null
  let wsReconnectTimer = null

  // ── Auto-scroll ──────────────────────────────────────────────
  logsEl.addEventListener('scroll', () => {
    const { scrollTop, scrollHeight, clientHeight } = logsEl
    autoScroll = scrollHeight - scrollTop - clientHeight < 60
  })

  function scrollToBottom() {
    if (autoScroll) logsEl.scrollTop = logsEl.scrollHeight
  }

  // ── Log rendering ─────────────────────────────────────────────
  function appendLog(text) {
    const lines = text.split('\n')
    for (const raw of lines) {
      const line = raw.trim()
      if (!line) continue

      const el = document.createElement('div')
      el.className = 'log-line ' + classifyLine(line)
      el.textContent = line
      logsEl.appendChild(el)
    }
    // Keep max 2000 lines
    while (logsEl.children.length > 2000) logsEl.removeChild(logsEl.firstChild)
    scrollToBottom()
  }

  function classifyLine(line) {
    const l = line.toLowerCase()
    if (l.includes('done') && l.includes('for help')) return 'done'
    if (l.includes('[error]') || l.includes('exception') || l.includes('error:')) return 'error'
    if (l.includes('[warn]')  || l.includes('warning')) return 'warn'
    if (l.includes('[info]'))  return 'info'
    return 'plain'
  }

  // ── Status ────────────────────────────────────────────────────
  async function fetchStatus() {
    try {
      const r = await fetch('/api/status')
      const { running } = await r.json()
      setRunning(running)
    } catch {
      setRunning(false)
    }
  }

  function setRunning(running) {
    if (isRunning === running) return
    isRunning = running

    statusBadge.className = 'status-badge ' + (running ? 'online' : 'offline')
    statusText.textContent  = running ? 'EN LIGNE' : 'HORS LIGNE'

    btnStart.disabled = running  || isTransitioning
    btnStop.disabled  = !running || isTransitioning
    consoleInput.disabled = !running
    btnSend.disabled      = !running

    if (running) {
      connectWS()
    } else if (!isStopping) {
      disconnectWS()
    }
  }

  // ── WebSocket logs ────────────────────────────────────────────
  function connectWS() {
    if (ws && ws.readyState <= 1) return
    clearTimeout(wsReconnectTimer)

    const proto = location.protocol === 'https:' ? 'wss' : 'ws'
    ws = new WebSocket(`${proto}://${location.host}/ws/logs`)

    ws.onmessage = e => appendLog(e.data)

    ws.onclose = () => {
      if (isRunning) {
        wsReconnectTimer = setTimeout(connectWS, 3000)
      }
    }

    ws.onerror = () => ws.close()
  }

  function disconnectWS() {
    clearTimeout(wsReconnectTimer)
    if (ws) { ws.close(); ws = null }
  }

  // ── Actions ───────────────────────────────────────────────────
  async function startServer() {
    if (isTransitioning) return
    isTransitioning = true
    btnStart.disabled = true
    btnStop.disabled  = true
    btnStart.innerHTML = '<span class="spin"></span>'
    const r = await fetch('/api/start', { method: 'POST' })
    const { success } = await r.json()
    isTransitioning = false
    btnStart.innerHTML = '▶ START'
    if (!success) appendLog('[dashboard] Échec du démarrage.')
    await fetchStatus()
  }

  async function stopServer() {
    if (isTransitioning) return
    isTransitioning = true
    isStopping = true
    btnStop.disabled  = true
    btnStart.disabled = true
    btnStop.innerHTML = '<span class="spin"></span>'
    appendLog('[dashboard] Arrêt en cours (save-all + stop)...')
    const r = await fetch('/api/stop', { method: 'POST' })
    const { success } = await r.json()
    isTransitioning = false
    isStopping = false
    btnStop.innerHTML = '■ STOP'
    if (!success) appendLog('[dashboard] Échec de l\'arrêt.')
    disconnectWS()
    isRunning = null
    await fetchStatus()
  }

  async function sendCommand() {
    const cmd = consoleInput.value.trim()
    if (!cmd) return

    appendLog(`> ${cmd}`)
    consoleInput.value = ''
    btnSend.disabled = true

    try {
      const r = await fetch('/api/console', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ command: cmd }),
      })
      const { output } = await r.json()
      if (output) appendLog(output)
    } catch {
      appendLog('[dashboard] Erreur lors de l\'envoi.')
    }

    btnSend.disabled = !isRunning
  }

  // ── Events ────────────────────────────────────────────────────
  btnStart.addEventListener('click', startServer)
  btnStop.addEventListener('click', stopServer)
  btnSend.addEventListener('click', sendCommand)
  consoleInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendCommand() })

  // ── Init ──────────────────────────────────────────────────────
  fetchStatus()
  setInterval(fetchStatus, 3000)
</script>
</body>
</html>
